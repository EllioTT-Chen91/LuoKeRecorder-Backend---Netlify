[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/hunts"
  to = "/.netlify/functions/hunts"
  status = 200

[[redirects]]
  from = "/api/hunts/*"
  to = "/.netlify/functions/hunts-put"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
